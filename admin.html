<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>白塞联盟 · 后台管理</title>
  <style>
    /* ============================================================
       CSS Variables & Reset
    ============================================================ */
    :root {
      --color-primary:    #1e3a6e;
      --color-primary-dark: #162d57;
      --color-secondary:  #4a9fd4;
      --color-accent:     #f07c3e;
      --color-bg:         #f0f4f8;
      --color-card:       #ffffff;
      --color-text:       #2d3748;
      --color-text-light: #718096;
      --color-border:     #e2e8f0;
      --color-success:    #38a169;
      --color-danger:     #e53e3e;
      --color-warning:    #d69e2e;
      --radius-sm:  6px;
      --radius-md:  12px;
      --radius-lg:  20px;
      --shadow-sm:  0 1px 4px rgba(0,0,0,0.08);
      --shadow-md:  0 4px 16px rgba(0,0,0,0.10);
      --shadow-lg:  0 8px 32px rgba(0,0,0,0.13);
      --sidebar-width: 240px;
      --header-height: 60px;
      --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
      --font-zh: "PingFang SC","Hiragino Sans GB","Microsoft YaHei","微软雅黑",system-ui,sans-serif;
      --font-en: "Segoe UI","Helvetica Neue",Arial,system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px}
    body{font-family:var(--font-zh);background:var(--color-bg);color:var(--color-text);line-height:1.6;overflow-x:hidden}
    a{color:var(--color-secondary);text-decoration:none}
    img{max-width:100%;display:block}
    ul{list-style:none}
    input,select,textarea,button{font-family:inherit;font-size:inherit}

    /* ============================================================
       Login Page
    ============================================================ */
    #loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a6e 0%,#2b5797 50%,#1a4f8a 100%);position:relative;overflow:hidden}
    #loginPage::before{content:'';position:absolute;top:-30%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(74,159,212,0.2) 0%,transparent 70%);pointer-events:none}
    .login-card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:48px 40px;width:400px;max-width:90vw;position:relative;z-index:1}
    .login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
    .login-logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--color-secondary),#6dc5f0);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;font-weight:700}
    .login-logo-text{font-size:1.3rem;font-weight:700;color:var(--color-primary)}
    .login-title{text-align:center;font-size:1.1rem;color:var(--color-text-light);margin-bottom:28px}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;font-size:0.88rem;font-weight:600;color:var(--color-text);margin-bottom:6px}
    .form-input{width:100%;padding:12px 14px;border:1.5px solid var(--color-border);border-radius:var(--radius-sm);font-size:0.95rem;transition:border-color var(--transition);background:#fff;color:var(--color-text)}
    .form-input:focus{outline:none;border-color:var(--color-secondary);box-shadow:0 0 0 3px rgba(74,159,212,0.15)}
    .form-input::placeholder{color:#a0aec0}
    textarea.form-input{resize:vertical;min-height:100px;line-height:1.6}
    select.form-input{cursor:pointer;appearance:auto}
    .login-error{background:#fff5f5;color:var(--color-danger);padding:10px 14px;border-radius:var(--radius-sm);font-size:0.88rem;margin-bottom:16px;display:none;border:1px solid #fed7d7}
    .login-error.show{display:block}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 24px;border-radius:var(--radius-sm);font-size:0.95rem;font-weight:600;cursor:pointer;border:none;transition:all var(--transition);font-family:inherit}
    .btn-primary{background:var(--color-accent);color:#fff}
    .btn-primary:hover{background:#d9672c;transform:translateY(-1px);box-shadow:0 4px 12px rgba(240,124,62,0.4)}
    .btn-secondary{background:var(--color-secondary);color:#fff}
    .btn-secondary:hover{background:#357ab3}
    .btn-danger{background:var(--color-danger);color:#fff}
    .btn-danger:hover{background:#c53030}
    .btn-outline{background:transparent;color:var(--color-secondary);border:1.5px solid var(--color-secondary)}
    .btn-outline:hover{background:var(--color-secondary);color:#fff}
    .btn-sm{padding:6px 14px;font-size:0.82rem}
    .btn-block{width:100%}
    .btn-group{display:flex;gap:10px;flex-wrap:wrap}

    /* ============================================================
       Admin Layout
    ============================================================ */
    #adminApp{display:none}
    #adminApp.active{display:flex}

    /* Sidebar */
    .sidebar{width:var(--sidebar-width);background:linear-gradient(180deg,var(--color-primary) 0%,var(--color-primary-dark) 100%);color:#fff;position:fixed;top:0;left:0;bottom:0;z-index:100;display:flex;flex-direction:column;overflow-y:auto}
    .sidebar-logo{display:flex;align-items:center;gap:10px;padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0}
    .sidebar-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--color-secondary),#6dc5f0);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:700;flex-shrink:0}
    .sidebar-logo-text{font-size:0.95rem;font-weight:700;line-height:1.3}
    .sidebar-logo-text small{font-size:0.72rem;color:rgba(255,255,255,0.6);display:block}
    .sidebar-nav{flex:1;padding:12px 0}
    .sidebar-nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:rgba(255,255,255,0.75);font-size:0.9rem;font-weight:500;cursor:pointer;transition:all var(--transition);border:none;background:none;width:100%;text-align:left}
    .sidebar-nav-item:hover{background:rgba(255,255,255,0.08);color:#fff}
    .sidebar-nav-item.active{background:rgba(255,255,255,0.15);color:#fff;font-weight:600;border-right:3px solid var(--color-accent)}
    .sidebar-nav-item .icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
    .sidebar-logout{border-top:1px solid rgba(255,255,255,0.1);padding:12px 0}
    .sidebar-logout .sidebar-nav-item{color:rgba(255,255,255,0.6)}
    .sidebar-logout .sidebar-nav-item:hover{color:#fc8181}

    /* Main Content */
    .main-content{margin-left:var(--sidebar-width);flex:1;min-height:100vh;display:flex;flex-direction:column}
    .top-header{height:var(--header-height);background:#fff;border-bottom:1px solid var(--color-border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow-sm)}
    .breadcrumb{font-size:0.92rem;color:var(--color-text-light)}
    .breadcrumb span{color:var(--color-text);font-weight:600}
    .admin-user{display:flex;align-items:center;gap:8px;font-size:0.88rem;color:var(--color-text)}
    .admin-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--color-secondary),#6dc5f0);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
    .content-area{flex:1;padding:28px}

    /* ============================================================
       Dashboard
    ============================================================ */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:32px}
    .stat-card{background:#fff;border-radius:var(--radius-md);padding:24px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:16px;transition:all var(--transition)}
    .stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
    .stat-icon{width:52px;height:52px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
    .stat-icon.articles{background:#ebf8ff;color:#3182ce}
    .stat-icon.doctors{background:#f0fff4;color:#38a169}
    .stat-icon.stories{background:#fffff0;color:#d69e2e}
    .stat-info h3{font-size:1.8rem;font-weight:800;color:var(--color-text);line-height:1}
    .stat-info p{font-size:0.85rem;color:var(--color-text-light);margin-top:4px}
    .recent-section{background:#fff;border-radius:var(--radius-md);padding:24px;box-shadow:var(--shadow-sm)}
    .recent-section h3{font-size:1.1rem;font-weight:700;color:var(--color-primary);margin-bottom:16px}
    .recent-list{display:flex;flex-direction:column;gap:12px}
    .recent-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--color-border)}
    .recent-item:last-child{border-bottom:none}
    .recent-item-left{display:flex;align-items:center;gap:10px}
    .recent-badge{padding:3px 8px;border-radius:4px;font-size:0.72rem;font-weight:600}
    .recent-badge.article{background:#ebf8ff;color:#3182ce}
    .recent-badge.story{background:#fffff0;color:#d69e2e}
    .recent-item-title{font-size:0.9rem;font-weight:500}
    .recent-item-time{font-size:0.8rem;color:var(--color-text-light)}

    /* ============================================================
       Table
    ============================================================ */
    .page-section{display:none}
    .page-section.active{display:block}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
    .section-header h2{font-size:1.3rem;font-weight:700;color:var(--color-primary)}
    .filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .filter-select{padding:8px 12px;border:1.5px solid var(--color-border);border-radius:var(--radius-sm);font-size:0.88rem;background:#fff;cursor:pointer}
    .filter-select:focus{outline:none;border-color:var(--color-secondary)}
    .data-table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
    .data-table thead{background:var(--color-primary);color:#fff}
    .data-table th{padding:12px 16px;text-align:left;font-size:0.85rem;font-weight:600;white-space:nowrap}
    .data-table td{padding:12px 16px;font-size:0.88rem;border-bottom:1px solid var(--color-border);vertical-align:middle}
    .data-table tbody tr:hover{background:#f7fafc}
    .data-table tbody tr:last-child td{border-bottom:none}
    .td-actions{display:flex;gap:8px;white-space:nowrap}
    .badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:0.78rem;font-weight:600}
    .badge-success{background:#f0fff4;color:var(--color-success)}
    .badge-warning{background:#fffff0;color:var(--color-warning)}
    .badge-info{background:#ebf8ff;color:#3182ce}
    .empty-state{text-align:center;padding:48px 20px;color:var(--color-text-light);font-size:0.95rem}

    /* ============================================================
       Modal
    ============================================================ */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.show{display:flex}
    .modal{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:640px;max-width:100%;max-height:85vh;display:flex;flex-direction:column}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--color-border)}
    .modal-header h3{font-size:1.1rem;font-weight:700;color:var(--color-primary)}
    .modal-close{width:32px;height:32px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:18px;color:var(--color-text-light);display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
    .modal-close:hover{background:var(--color-bg);color:var(--color-text)}
    .modal-body{padding:24px;overflow-y:auto;flex:1}
    .modal-footer{padding:16px 24px;border-top:1px solid var(--color-border);display:flex;justify-content:flex-end;gap:10px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .form-row-full{grid-template-columns:1fr}
    .switch{position:relative;display:inline-block;width:44px;height:24px}
    .switch input{opacity:0;width:0;height:0}
    .switch-slider{position:absolute;cursor:pointer;inset:0;background:#cbd5e0;border-radius:24px;transition:var(--transition)}
    .switch-slider::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:var(--transition)}
    .switch input:checked + .switch-slider{background:var(--color-success)}
    .switch input:checked + .switch-slider::before{transform:translateX(20px)}

    /* Confirm Dialog */
    .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
    .confirm-overlay.show{display:flex}
    .confirm-box{background:#fff;border-radius:var(--radius-md);padding:32px;text-align:center;max-width:400px;box-shadow:var(--shadow-lg)}
    .confirm-box .icon{font-size:48px;margin-bottom:16px}
    .confirm-box h3{font-size:1.1rem;font-weight:700;margin-bottom:8px}
    .confirm-box p{font-size:0.9rem;color:var(--color-text-light);margin-bottom:24px}

    /* ============================================================
       Settings
    ============================================================ */
    .settings-card{background:#fff;border-radius:var(--radius-md);padding:28px;box-shadow:var(--shadow-sm);max-width:720px}
    .settings-card h3{font-size:1.1rem;font-weight:700;color:var(--color-primary);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--color-border)}

    /* ============================================================
       Toast
    ============================================================ */
    .toast-container{position:fixed;top:20px;right:20px;z-index:500;display:flex;flex-direction:column;gap:10px}
    .toast{padding:14px 20px;border-radius:var(--radius-sm);color:#fff;font-size:0.88rem;font-weight:500;box-shadow:var(--shadow-md);animation:toastIn 0.3s ease;min-width:260px}
    .toast-success{background:var(--color-success)}
    .toast-error{background:var(--color-danger)}
    .toast-info{background:var(--color-secondary)}
    @keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

    /* ============================================================
       Responsive
    ============================================================ */
    .sidebar-toggle{display:none;background:none;border:none;font-size:20px;cursor:pointer;padding:4px;color:var(--color-text)}
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%);transition:transform var(--transition)}
      .sidebar.open{transform:translateX(0)}
      .main-content{margin-left:0}
      .sidebar-toggle{display:block}
      .form-row{grid-template-columns:1fr}
      .stats-grid{grid-template-columns:1fr}
      .data-table{font-size:0.82rem}
      .data-table th,.data-table td{padding:8px 10px}
      .content-area{padding:16px}
    }
  </style>
</head>
<body>

<!-- ============================================================
     Login Page
============================================================ -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">B</div>
      <div class="login-logo-text">白塞联盟</div>
    </div>
    <div class="login-title">后台管理系统</div>
    <div class="login-error" id="loginError"></div>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" class="form-input" id="loginUsername" placeholder="请输入用户名" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" autocomplete="current-password" />
    </div>
    <button class="btn btn-primary btn-block" id="loginBtn" style="margin-top:8px;padding:13px">登 录</button>
  </div>
</div>

<!-- ============================================================
     Admin Layout
============================================================ -->
<div id="adminApp">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">B</div>
      <div class="sidebar-logo-text">白塞联盟<small>Administration Panel</small></div>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-nav-item active" data-page="dashboard">
        <span class="icon">📊</span>仪表盘
      </button>
      <button class="sidebar-nav-item" data-page="articles">
        <span class="icon">📚</span>知识库管理
      </button>
      <button class="sidebar-nav-item" data-page="doctors">
        <span class="icon">👨‍⚕️</span>医生管理
      </button>
      <button class="sidebar-nav-item" data-page="stories">
        <span class="icon">💬</span>故事管理
      </button>
      <button class="sidebar-nav-item" data-page="news">
        <span class="icon">📰</span>资讯管理
      </button>
      <button class="sidebar-nav-item" data-page="settings">
        <span class="icon">⚙️</span>网站设置
      </button>
    </nav>
    <div class="sidebar-logout">
      <button class="sidebar-nav-item" id="logoutBtn">
        <span class="icon">🚪</span>退出登录
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <header class="top-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="sidebar-toggle" id="sidebarToggle">☰</button>
        <div class="breadcrumb">首页 / <span id="breadcrumbTitle">仪表盘</span></div>
      </div>
      <div class="admin-user">
        <div class="admin-avatar">A</div>
        <span id="adminName">admin</span>
      </div>
    </header>

    <div class="content-area">

      <!-- Dashboard -->
      <div class="page-section active" id="page-dashboard">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon articles">📚</div>
            <div class="stat-info"><h3 id="statArticles">0</h3><p>知识库文章</p></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon doctors">👨‍⚕️</div>
            <div class="stat-info"><h3 id="statDoctors">0</h3><p>收录医生</p></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon stories">💬</div>
            <div class="stat-info"><h3 id="statStories">0</h3><p>病友故事</p></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:#fff5f5;color:#e53e3e">📰</div>
            <div class="stat-info"><h3 id="statNews">0</h3><p>资讯</p></div>
          </div>
        </div>
        <div class="recent-section">
          <h3>最近更新</h3>
          <div class="recent-list" id="recentList"></div>
        </div>
      </div>

      <!-- Articles -->
      <div class="page-section" id="page-articles">
        <div class="section-header">
          <h2>知识库管理</h2>
          <div class="filter-bar">
            <select class="filter-select" id="articleCategoryFilter">
              <option value="all">全部分类</option>
              <option value="疾病百科">疾病百科</option>
              <option value="常用药物">常用药物</option>
              <option value="诊断标准">诊断标准</option>
              <option value="预后管理">预后管理</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="openArticleModal()">+ 新建文章</button>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr><th>ID</th><th>分类</th><th>中文标题</th><th>英文标题</th><th>更新时间</th><th>操作</th></tr>
            </thead>
            <tbody id="articlesTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Doctors -->
      <div class="page-section" id="page-doctors">
        <div class="section-header">
          <h2>医生管理</h2>
          <div class="filter-bar">
            <select class="filter-select" id="doctorCityFilter">
              <option value="all">全部城市</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="openDoctorModal()">+ 添加医生</button>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr><th>ID</th><th>城市</th><th>医院</th><th>科室</th><th>姓名</th><th>专长</th><th>职称</th><th>专病门诊</th><th>操作</th></tr>
            </thead>
            <tbody id="doctorsTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Stories -->
      <div class="page-section" id="page-stories">
        <div class="section-header">
          <h2>故事管理</h2>
          <div class="filter-bar">
            <button class="btn btn-primary btn-sm" onclick="openStoryModal()">+ 新建故事</button>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr><th>ID</th><th>中文标题</th><th>作者</th><th>地区</th><th>状态</th><th>更新时间</th><th>操作</th></tr>
            </thead>
            <tbody id="storiesTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- News -->
      <div class="page-section" id="page-news">
        <div class="section-header">
          <h2>资讯管理</h2>
          <div class="filter-bar">
            <button class="btn btn-primary btn-sm" onclick="openNewsModal()">+ 新增资讯</button>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr><th>ID</th><th>标题</th><th>摘要</th><th>置顶</th><th>发布时间</th><th>操作</th></tr>
            </thead>
            <tbody id="newsTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Settings -->
      <div class="page-section" id="page-settings">
        <div class="section-header">
          <h2>网站设置</h2>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
/* ============================================================
   Global State & Helpers
============================================================ */
let token = localStorage.getItem('behcet_admin_token') || '';
let currentAdmin = JSON.parse(localStorage.getItem('behcet_admin_user') || 'null');
let confirmCallback = null;

const API_BASE = '/api';

/** Make authenticated API request */
async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    }
  };
  if (body && method !== 'GET') {
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(API_BASE + path, opts);
  const data = await res.json();

  if (res.status === 401) {
    logout();
    throw new Error(data.error || '认证失败，请重新登录');
  }
  if (!res.ok) {
    throw new Error(data.error || '请求失败');
  }
  return data;
}

/** Show toast notification */
function showToast(message, type) {
  type = type || 'info';
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(function() {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(40px)';
    toast.style.transition = '0.3s ease';
    setTimeout(function() { toast.remove(); }, 300);
  }, 3000);
}

/** Show confirm dialog */
function showConfirm(message, callback) {
  confirmCallback = callback;
  document.getElementById('confirmMessage').textContent = message;
  document.getElementById('confirmDialog').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirmDialog').classList.remove('show');
  confirmCallback = null;
}

document.getElementById('confirmOkBtn').addEventListener('click', function() {
  if (confirmCallback) confirmCallback();
  closeConfirm();
});

/** Format datetime string */
function formatTime(str) {
  if (!str) return '-';
  return str.replace('T', ' ').substring(0, 16);
}

/** Escape HTML */
function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ============================================================
   Auth
============================================================ */
function checkAuth() {
  if (token) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminApp').classList.add('active');
    if (currentAdmin) {
      document.getElementById('adminName').textContent = currentAdmin.username || 'admin';
    }
    loadDashboard();
  } else {
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('adminApp').classList.remove('active');
  }
}

async function login() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  const errorEl = document.getElementById('loginError');

  if (!username || !password) {
    errorEl.textContent = '请输入用户名和密码';
    errorEl.classList.add('show');
    return;
  }

  try {
    const res = await fetch(API_BASE + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (!res.ok) {
      errorEl.textContent = data.error || '登录失败';
      errorEl.classList.add('show');
      return;
    }

    token = data.token;
    currentAdmin = data.user;
    localStorage.setItem('behcet_admin_token', token);
    localStorage.setItem('behcet_admin_user', JSON.stringify(currentAdmin));
    errorEl.classList.remove('show');
    checkAuth();
  } catch (err) {
    errorEl.textContent = '网络错误，请检查服务器';
    errorEl.classList.add('show');
  }
}

function logout() {
  token = '';
  currentAdmin = null;
  localStorage.removeItem('behcet_admin_token');
  localStorage.removeItem('behcet_admin_user');
  checkAuth();
}

document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('loginPassword').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});
document.getElementById('logoutBtn').addEventListener('click', logout);

/* ============================================================
   Navigation
============================================================ */
const pageTitles = {
  dashboard: '仪表盘',
  articles: '知识库管理',
  doctors: '医生管理',
  stories: '故事管理',
  news: '资讯管理',
  settings: '网站设置'
};

function switchPage(page) {
  // Update sidebar
  document.querySelectorAll('.sidebar-nav-item[data-page]').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.page === page);
  });

  // Update content
  document.querySelectorAll('.page-section').forEach(function(sec) {
    sec.classList.toggle('active', sec.id === 'page-' + page);
  });

  // Update breadcrumb
  document.getElementById('breadcrumbTitle').textContent = pageTitles[page] || page;

  // Close sidebar on mobile
  document.getElementById('sidebar').classList.remove('open');

  // Load data
  if (page === 'dashboard') loadDashboard();
  else if (page === 'articles') loadArticles();
  else if (page === 'doctors') { loadDoctorCities(); loadDoctors(); }
  else if (page === 'stories') loadStories();
  else if (page === 'news') loadNews();
  else if (page === 'settings') loadSettings();
}

document.querySelectorAll('.sidebar-nav-item[data-page]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    switchPage(btn.dataset.page);
  });
});

document.getElementById('sidebarToggle').addEventListener('click', function() {
  document.getElementById('sidebar').classList.toggle('open');
});

/* ============================================================
   Dashboard
============================================================ */
async function loadDashboard() {
  try {
    const data = await api('GET', '/dashboard');
    document.getElementById('statArticles').textContent = data.stats.articles;
    document.getElementById('statDoctors').textContent = data.stats.doctors;
    document.getElementById('statStories').textContent = data.stats.stories;
    document.getElementById('statNews').textContent = data.stats.news || 0;

    const listEl = document.getElementById('recentList');
    if (data.recentUpdates.length === 0) {
      listEl.innerHTML = '<div class="empty-state">暂无更新记录</div>';
    } else {
      listEl.innerHTML = data.recentUpdates.map(function(item) {
        var badgeClass = item.type === 'article' ? 'article' : 'story';
        var badgeText = item.type === 'article' ? '文章' : '故事';
        return '<div class="recent-item">' +
          '<div class="recent-item-left">' +
          '<span class="recent-badge ' + badgeClass + '">' + badgeText + '</span>' +
          '<span class="recent-item-title">' + esc(item.title) + '</span>' +
          '</div>' +
          '<span class="recent-item-time">' + formatTime(item.updated_at) + '</span>' +
          '</div>';
      }).join('');
    }
  } catch (err) {
    showToast('加载仪表盘失败: ' + err.message, 'error');
  }
}

/* ============================================================
   Articles CRUD
============================================================ */
async function loadArticles() {
  try {
    var category = document.getElementById('articleCategoryFilter').value;
    var data = await api('GET', '/articles?category=' + category);
    var tbody = document.getElementById('articlesTableBody');

    if (data.articles.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无文章数据</td></tr>';
      return;
    }

    tbody.innerHTML = data.articles.map(function(a) {
      return '<tr>' +
        '<td>' + a.id + '</td>' +
        '<td><span class="badge badge-info">' + esc(a.category) + '</span></td>' +
        '<td>' + esc(a.title_zh) + '</td>' +
        '<td>' + esc(a.title_en) + '</td>' +
        '<td>' + formatTime(a.updated_at) + '</td>' +
        '<td class="td-actions">' +
        '<button class="btn btn-outline btn-sm" onclick="editArticle(' + a.id + ')">编辑</button>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteArticle(' + a.id + ')">删除</button>' +
        '</td></tr>';
    }).join('');
  } catch (err) {
    showToast('加载文章失败: ' + err.message, 'error');
  }
}

document.getElementById('articleCategoryFilter').addEventListener('change', loadArticles);

function openArticleModal(article) {
  document.getElementById('articleEditId').value = article ? article.id : '';
  document.getElementById('articleModalTitle').textContent = article ? '编辑文章' : '新建文章';
  document.getElementById('articleCategory').value = article ? article.category : '疾病百科';
  document.getElementById('articleTitleZh').value = article ? article.title_zh : '';
  document.getElementById('articleTitleEn').value = article ? article.title_en : '';
  document.getElementById('articleContentZh').value = article ? article.content_zh : '';
  document.getElementById('articleContentEn').value = article ? article.content_en : '';
  document.getElementById('articleModal').classList.add('show');
}

function closeArticleModal() {
  document.getElementById('articleModal').classList.remove('show');
}

async function editArticle(id) {
  try {
    var data = await api('GET', '/articles/' + id);
    openArticleModal(data.article);
  } catch (err) {
    showToast('加载文章失败: ' + err.message, 'error');
  }
}

async function saveArticle() {
  var id = document.getElementById('articleEditId').value;
  var body = {
    category: document.getElementById('articleCategory').value,
    title_zh: document.getElementById('articleTitleZh').value.trim(),
    title_en: document.getElementById('articleTitleEn').value.trim(),
    content_zh: document.getElementById('articleContentZh').value.trim(),
    content_en: document.getElementById('articleContentEn').value.trim()
  };

  if (!body.title_zh) {
    showToast('中文标题不能为空', 'error');
    return;
  }

  try {
    if (id) {
      await api('PUT', '/articles/' + id, body);
      showToast('文章更新成功', 'success');
    } else {
      await api('POST', '/articles', body);
      showToast('文章创建成功', 'success');
    }
    closeArticleModal();
    loadArticles();
  } catch (err) {
    showToast('保存失败: ' + err.message, 'error');
  }
}

function deleteArticle(id) {
  showConfirm('确定要删除这篇文章吗？此操作不可撤销。', function() {
    api('DELETE', '/articles/' + id).then(function() {
      showToast('文章删除成功', 'success');
      loadArticles();
    }).catch(function(err) {
      showToast('删除失败: ' + err.message, 'error');
    });
  });
}

/* ============================================================
   Doctors CRUD
============================================================ */
async function loadDoctors() {
  try {
    var city = document.getElementById('doctorCityFilter').value;
    var data = await api('GET', '/doctors?city=' + city);
    var tbody = document.getElementById('doctorsTableBody');

    if (data.doctors.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="empty-state">暂无医生数据</td></tr>';
      return;
    }

    tbody.innerHTML = data.doctors.map(function(d) {
      var specialtyBadge = d.is_specialty_clinic
        ? '<span class="badge badge-success">是</span>'
        : '<span class="badge badge-warning">否</span>';
      return '<tr>' +
        '<td>' + d.id + '</td>' +
        '<td>' + esc(d.city) + '</td>' +
        '<td>' + esc(d.hospital) + '</td>' +
        '<td>' + esc(d.department) + '</td>' +
        '<td>' + esc(d.name_zh) + '</td>' +
        '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(d.specialty_zh) + '">' + esc(d.specialty_zh) + '</td>' +
        '<td>' + esc(d.title || '-') + '</td>' +
        '<td>' + specialtyBadge + '</td>' +
        '<td class="td-actions">' +
        '<button class="btn btn-outline btn-sm" onclick="editDoctor(' + d.id + ')">编辑</button>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteDoctor(' + d.id + ')">删除</button>' +
        '</td></tr>';
    }).join('');
  } catch (err) {
    showToast('加载医生失败: ' + err.message, 'error');
  }
}

document.getElementById('doctorCityFilter').addEventListener('change', loadDoctors);

function openDoctorModal(doctor) {
  document.getElementById('doctorEditId').value = doctor ? doctor.id : '';
  document.getElementById('doctorModalTitle').textContent = doctor ? '编辑医生' : '添加医生';

async function loadStories() {
  try {
    var data = await api('GET', '/stories');
    var tbody = document.getElementById('storiesTableBody');

    if (data.stories.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state">暂无故事数据</td></tr>';
      return;
    }

    tbody.innerHTML = data.stories.map(function(s) {
      var statusBadge = s.published
        ? '<span class="badge badge-success">已发布</span>'
        : '<span class="badge badge-warning">未发布</span>';
      return '<tr>' +
        '<td>' + s.id + '</td>' +
        '<td>' + esc(s.title_zh) + '</td>' +
        '<td>' + esc(s.author) + '</td>' +
        '<td>' + esc(s.location) + '</td>' +
        '<td>' + statusBadge + '</td>' +
        '<td>' + formatTime(s.updated_at) + '</td>' +
        '<td class="td-actions">' +
        '<button class="btn btn-outline btn-sm" onclick="editStory(' + s.id + ')">编辑</button>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteStory(' + s.id + ')">删除</button>' +
        '</td></tr>';
    }).join('');
  } catch (err) {
    showToast('加载故事失败: ' + err.message, 'error');

/* Load doctor cities dynamically from API */
async function loadDoctorCities() {
  try {
    var data = await api('GET', '/cities');
    var selectEl = document.getElementById('doctorCityFilter');
    if (!selectEl || !data.cities) return;
    // Preserve current selection
    var currentVal = selectEl.value;
    var html = '<option value="all">全部城市</option>';
    data.cities.forEach(function(city) {
      html += '<option value="' + esc(city) + '">' + esc(city) + '</option>';
    });
    selectEl.innerHTML = html;
    // Restore selection if still available
    if (currentVal) {
      selectEl.value = currentVal;
    }
  } catch (err) {
    console.error('加载城市列表失败', err);
  }
}

/* ============================================================
   News CRUD
============================================================ */
async function loadNews() {
  try {
    var data = await api('GET', '/news?limit=50');
    var tbody = document.getElementById('newsTableBody');

    if (!data.news || data.news.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无资讯</td></tr>';
      return;
    }

    tbody.innerHTML = data.news.map(function(n) {
      var pinnedBadge = n.is_pinned
        ? '<span style="color:#e53e3e;font-weight:600">📌 置顶</span>'
        : '-';
      return '<tr>' +
        '<td>' + n.id + '</td>' +
        '<td>' + esc(n.title) + '</td>' +
        '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(n.summary) + '">' + esc(n.summary || '-') + '</td>' +
        '<td>' + pinnedBadge + '</td>' +
        '<td>' + formatTime(n.published_at || n.created_at) + '</td>' +
        '<td class="td-actions">' +
        '<button class="btn btn-outline btn-sm" onclick="editNews(' + n.id + ')">编辑</button>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteNews(' + n.id + ')">删除</button>' +
        '</td></tr>';
    }).join('');
  } catch (err) {
    showToast('加载资讯失败: ' + err.message, 'error');
  }
}

  document.getElementById('newsEditId').value = news ? news.id : '';
